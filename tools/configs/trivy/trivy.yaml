scan:
  # Same as '--scanners'
  scanners:
    - vuln
    # - secret

  skip-dirs:
    - "**/.devenv"
    - "**/.git"
    - "**/.direnv"
    - "**/tools/quitsh"

vulnerability:
  # Same as '--ignore-status'
  ignore-status: []

  # Same as '--ignore-unfixed'
  ignore-unfixed: false

  # Same as '--vuln-severity-source'
  severity-source:
    - auto

  # Same as '--skip-vex-repo-update'
  skip-vex-repo-update: false

  # Same as '--vex'
  vex: []

# Same as '--severity'
severity:
  # - UNKNOWN
  # - LOW
  - MEDIUM
  - HIGH
  - CRITICAL
