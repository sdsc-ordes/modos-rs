# yaml-language-server: $schema=https://version-2026-5.goauthentik.io/blueprints/schema.json
# Authentik blueprint mirroring the Keycloak `modos` realm
# (tools/configs/keycloak/modos-realm.json).
#
# Scope of this blueprint:
#   * the same test user and groups,
#   * a simple OIDC authorization-code application,
#   * a single scope mapping that re-implements ONLY the custom Keycloak
#     `oidc-bucket-permissions-mapper` (components/keycloak-mapper/.../
#     BucketPermissionsMapper.java) in Python.

version: 1
metadata:
  name: modos
  labels:
    blueprints.goauthentik.io/description: >-
      modos test user, groups, OIDC app and the bucket-permissions scope mapping.

entries:
  # Groups
  # ==============================================
  - model: authentik_core.group
    id: group-bucket-d
    identifiers:
      pk: 5ca45d3f-4dd4-4be1-888e-d489b236daa4
    attrs:
      name: group-bucket-d
      attributes:
        bucket-path: bucket-d/d
        bucket-permission: read

  - model: authentik_core.group
    id: group-bucket-d-partial
    identifiers:
      pk: e692dd5d-f8ae-4161-ba91-b91034adeadb
    attrs:
      name: group-bucket-d-partial
      parents:
        - !KeyOf group-bucket-d
      attributes:
        bucket-path: bucket-d/d/subpath
        bucket-permission: write

  - model: authentik_core.group
    id: group-bucket-e
    identifiers:
      pk: f955757c-5be0-4738-b003-cfe272db7061
    attrs:
      name: group-bucket-e
      attributes:
        bucket-path: bucket-e/e/subpath
        bucket-permission: read

  - model: authentik_core.group
    id: bucket-c-subpath
    identifiers:
      pk: cc97ca58-7e87-4f12-9e1e-4477a50a6fd4
    attrs:
      name: bucket-c-subpath

  - model: authentik_core.group
    id: bucket-c-subpath-read
    identifiers:
      pk: 7f931e8f-c9eb-4fa8-8d5d-1124cd670e63
    attrs:
      name: "bucket-c/subpath/@read"
      parents:
        - !KeyOf bucket-c-subpath

  - model: authentik_core.group
    id: bucket-c-subpath-write
    identifiers:
      pk: db37a62c-a35d-4fac-bd10-f73aa82e9729
    attrs:
      name: "bucket-c/subpath/@write"
      parents:
        - !KeyOf bucket-c-subpath
  # ==============================================

  # User
  # ==============================================
  - model: authentik_core.user
    id: user-test
    identifiers:
      username: test@example.com
    attrs:
      username: test@example.com
      email: test@example.com
      name: test
      is_active: true
      password: test
      attributes:
        bucket-permissions:
          - bucket-a/a/b/@read
          - bucket-b/b/@write
      groups:
        - !KeyOf group-bucket-d
        - !KeyOf group-bucket-d-partial
        - !KeyOf group-bucket-e
        - !KeyOf bucket-c-subpath-read
        - !KeyOf bucket-c-subpath-write
  # ==============================================

  # # Device Code flow
  # # ==============================================
  # # Enables the OAuth2 Device Authorization Grant (RFC 8628), matching the
  # # Keycloak `modos-cli` client (oauth2.device.authorization.grant.enabled) and
  # # driven by tools/nu/device-code-flow.nu --provider authentik.
  # #
  # # In authentik the device grant is NOT a per-provider toggle: it is turned on
  # # by pointing the Brand's `flow_device_code` at a flow whose designation is
  # # `stage_configuration`. `require_authenticated` gates the user through the
  # # normal browser login first; the (empty) flow then completes the device
  # # authorization. Add stage bindings here later if you want an explicit consent.
  - model: authentik_flows.flow
    id: flow-device-code
    identifiers:
      slug: modos-device-code
    attrs:
      name: modos-device-code
      title: Device code flow
      designation: stage_configuration
      authentication: require_authenticated

  # Bind the device-code flow to the default brand so `/application/o/device/`
  # is served. The shipped default brand has domain `authentik-default`.
  - model: authentik_brands.brand
    identifiers:
      domain: authentik-default
    attrs:
      flow_device_code: !KeyOf flow-device-code
  # ==============================================

  # Signing key
  # ==============================================
  # ES256 (P-256) self-signed keypair used to sign modos-cli JWTs.
  - model: authentik_crypto.certificatekeypair
    id: cert-modos-es256
    identifiers:
      name: modos-cli-es256
    attrs:
      name: modos-cli-es256
      certificate_data: |
        -----BEGIN CERTIFICATE-----
        MIIBfjCCASOgAwIBAgIUCikUqtXQZfOwclfEneLmb0YTfZ4wCgYIKoZIzj0EAwIw
        FDESMBAGA1UEAwwJbW9kb3MtY2xpMB4XDTI2MDcyMDE0NDA0M1oXDTM2MDcxNzE0
        NDA0M1owFDESMBAGA1UEAwwJbW9kb3MtY2xpMFkwEwYHKoZIzj0CAQYIKoZIzj0D
        AQcDQgAEtqrpRyMk89oaGyd3gcc4XePoh9isY58ivk29eTowiISBU6pJ2GjMkHLL
        vtW7XKb0fRPCpTLE7+2sFaAOfvfu86NTMFEwHQYDVR0OBBYEFIf29TLtHhiTfyqF
        fXYz3dhyb3AzMB8GA1UdIwQYMBaAFIf29TLtHhiTfyqFfXYz3dhyb3AzMA8GA1Ud
        EwEB/wQFMAMBAf8wCgYIKoZIzj0EAwIDSQAwRgIhAMVVq0Ij5Y185HQDziotdjbh
        MdDnXtj4bJ/8lLhQf0xJAiEA4to9toElrcKaiuUXSCGduPVeoakds3+Z4qFl/IMZ
        ecE=
        -----END CERTIFICATE-----
      key_data: |
        -----BEGIN PRIVATE KEY-----
        MIGHAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBG0wawIBAQQgE2rYNDdsy50q8Z+c
        FJRWAy7ZXtn8EOYpYhrLH3P425+hRANCAAS2qulHIyTz2hobJ3eBxzhd4+iH2Kxj
        nyK+Tb15OjCIhIFTqknYaMyQcsu+1btcpvR9E8KlMsTv7awVoA5+9+7z
        -----END PRIVATE KEY-----

  # # OIDC application + provider
  # # ==============================================
  # # Public client `modos-cli`, equivalent to the Keycloak client. The device
  # # grant is enabled via the brand binding above. `authorization_flow` is
  # # required by the provider model; implicit consent mirrors Keycloak's
  # # `consentRequired: false`. No redirect URIs are needed for a device-only CLI.
  # - model: authentik_providers_oauth2.oauth2provider
  #   id: prov-modos-cli
  #   identifiers:
  #     name: modos-cli
  #   attrs:
  #     name: modos-cli
  #     client_type: public
  #     client_id: modos-cli
  #     sub_mode: user_username
  #
  #     # Sign tokens with the ES256 (P-256) keypair defined above.
  #     # The provider only supports RS256 and ES256/384/512.
  #     # EdDSA with ed25119 is not supported.
  #     signing_key: !KeyOf cert-modos-es256
  #
  #     authorization_flow:
  #       !Find [
  #         authentik_flows.flow,
  #         [slug, default-provider-authorization-implicit-consent],
  #       ]
  #
  #     invalidation_flow:
  #       !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
  #
  #     property_mappings:
  #       - !Find [
  #           authentik_providers_oauth2.scopemapping,
  #           [managed, goauthentik.io/providers/oauth2/scope-openid],
  #         ]
  #       - !Find [
  #           authentik_providers_oauth2.scopemapping,
  #           [managed, goauthentik.io/providers/oauth2/scope-profile],
  #         ]
  #       - !Find [
  #           authentik_providers_oauth2.scopemapping,
  #           [managed, goauthentik.io/providers/oauth2/scope-email],
  #         ]
  #
  # - model: authentik_core.application
  #   id: app-modos-cli
  #   identifiers:
  #     slug: modos-cli
  #   attrs:
  #     name: modos-cli
  #     slug: modos-cli
  #     provider: !KeyOf prov-modos-cli
  # ==============================================
