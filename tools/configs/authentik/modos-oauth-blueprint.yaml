  # OIDC application + provider
  # ==============================================
  # Public client `modos-cli`, equivalent to the Keycloak client. The device
  # grant is enabled via the brand binding above. `authorization_flow` is
  # required by the provider model; implicit consent mirrors Keycloak's
  # `consentRequired: false`. No redirect URIs are needed for a device-only CLI.
  - model: authentik_providers_oauth2.oauth2provider
    id: modos-oauth-provider
    identifiers:
      name: Modos CLI
    attrs:
      name: Modos CLI

      client_type: public
      client_id: modos-cli
      sub_mode: user_username

      # Somehow needs to be provided...?
      redirect_uris: []

      grant_types:
        - urn:ietf:params:oauth:grant-type:device_code
        - refresh_token

      # Sign tokens with the ES256 (P-256) keypair defined above.
      # The provider only supports RS256 and ES256/384/512.
      # EdDSA with ed25119 is not supported.
      signing_key: !KeyOf cert-modos-es256

      authorization_flow:
        !Find [
          authentik_flows.flow,
          [slug, default-provider-authorization-implicit-consent],
        ]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      property_mappings:
        - !Find [
            authentik_providers_oauth2.scopemapping,
            [managed, goauthentik.io/providers/oauth2/scope-openid],
          ]
        - !Find [
            authentik_providers_oauth2.scopemapping,
            [managed, goauthentik.io/providers/oauth2/scope-profile],
          ]
        - !Find [
            authentik_providers_oauth2.scopemapping,
            [managed, goauthentik.io/providers/oauth2/scope-email],
          ]

  # The modos application.
  - model: authentik_core.application
    id: modos-cli-app
    identifiers:
      pk: d6de3d01-5e99-493c-8c16-5a8fc681ed43
    attrs:
      name: Modos CLI
      slug: modos-cli-app
      provider: !KeyOf modos-oauth-provider
