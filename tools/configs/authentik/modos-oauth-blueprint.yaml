# yaml-language-server: $schema=https://version-2026-5.goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: Modos OAuth

entries:
  # Device Code flow
  # ==============================================
  # Enables the OAuth2 Device Authorization Grant (RFC 8628)
  #
  # It is turned on by pointing the Brand's `flow_device_code` at a flow whose
  # designation is `stage_configuration`.
  # The `require_authenticated` gates the user through the
  # normal browser login first; the (empty) flow then completes the device
  # authorization.
  # NOTE: Add stage bindings here later if you want an explicit consent.
  - model: authentik_flows.flow
    id: modos-device-code-flow
    identifiers:
      slug: modos-device-code-flow
    attrs:
      name: Modos Device Code Flow
      title: Modos Device Code Flow
      designation: stage_configuration
      authentication: require_authenticated

  # Bind the device-code flow to the default brand so `/application/o/device/`
  # is served.
  # The shipped default brand has domain `authentik-default`.
  - model: authentik_brands.brand
    identifiers:
      domain: authentik-default
    attrs:
      flow_device_code: !KeyOf modos-device-code-flow
  # ==============================================

  # Signing key
  # ==============================================
  # ES256 (P-256) self-signed keypair used to sign modos-cli JWTs.
  - model: authentik_crypto.certificatekeypair
    id: cert-modos-es256
    identifiers:
      name: Modos ES256
    attrs:
      certificate_data: |
        -----BEGIN CERTIFICATE-----
