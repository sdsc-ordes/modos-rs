# yaml-language-server: $schema=https://version-2026-5.goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: Modos OAuth

entries:
  # Device Code flow
  # ==============================================
  # Enables the OAuth2 Device Authorization Grant (RFC 8628)
  #
  # It is turned on by pointing the Brand's `flow_device_code` at a flow whose
  # designation is `stage_configuration`.
  # The `require_authenticated` gates the user through the
  # normal browser login first; the (empty) flow then completes the device
  # authorization.
  # NOTE: Add stage bindings here later if you want an explicit consent.
  - model: authentik_flows.flow
    id: modos-device-code-flow
    identifiers:
      pk: 8a3804de-fea1-452d-8c03-ce82af82a79b
    attrs:
      slug: modos-device-code-flow
      name: Modos Device Code Flow
      title: Modos Device Code Flow
      designation: stage_configuration
      authentication: require_authenticated

  # The device-code flow needs at least one stage that renders and then
  # completes the flow.  A consent stage
  # shows the "authorize this device?" prompt and finalizes the grant.
  - model: authentik_stages_consent.consentstage
    id: modos-device-consent
    identifiers:
      pk: 58f66acd-4777-4988-bf7a-208e0a7456b7
    attrs:
      name: Modos Device Consent
      mode: always_require

  - model: authentik_flows.flowstagebinding
    id: modos-device-consent-binding
    identifiers:
      pk: 5915a4b0-a5bb-4a7d-ae2c-63b5b6909991
    attrs:
      target: !KeyOf modos-device-code-flow
      stage: !KeyOf modos-device-consent
      order: 0

  # Bind the device-code flow to the default brand so `/application/o/device/`
  # is served.
  # The shipped default brand has domain `authentik-default`.
  - model: authentik_brands.brand
    identifiers:
      domain: authentik-default
    attrs:
      flow_device_code: !KeyOf modos-device-code-flow
  # ==============================================

  # Signing key
  # ==============================================
  # ES256 (P-256) self-signed keypair used to sign modos-cli JWTs.
  - model: authentik_crypto.certificatekeypair
    id: cert-modos-es256
    identifiers:
      pk: ad0731d3-9c1e-4650-bc5b-bf4b1dbb4037
    attrs:
      name: Modos ES256
      certificate_data: |
        -----BEGIN CERTIFICATE-----
        MIIBfjCCASOgAwIBAgIUCikUqtXQZfOwclfEneLmb0YTfZ4wCgYIKoZIzj0EAwIw
        FDESMBAGA1UEAwwJbW9kb3MtY2xpMB4XDTI2MDcyMDE0NDA0M1oXDTM2MDcxNzE0
        NDA0M1owFDESMBAGA1UEAwwJbW9kb3MtY2xpMFkwEwYHKoZIzj0CAQYIKoZIzj0D
        AQcDQgAEtqrpRyMk89oaGyd3gcc4XePoh9isY58ivk29eTowiISBU6pJ2GjMkHLL
        vtW7XKb0fRPCpTLE7+2sFaAOfvfu86NTMFEwHQYDVR0OBBYEFIf29TLtHhiTfyqF
        fXYz3dhyb3AzMB8GA1UdIwQYMBaAFIf29TLtHhiTfyqFfXYz3dhyb3AzMA8GA1Ud
        EwEB/wQFMAMBAf8wCgYIKoZIzj0EAwIDSQAwRgIhAMVVq0Ij5Y185HQDziotdjbh
