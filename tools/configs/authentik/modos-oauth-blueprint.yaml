  # Property Mapping
  # ==============================================
  # surface the user's `bucket-permissions` attribute as a
  # `bp-user` claim in the issued JWT (access token + id_token + userinfo).
  #
  # The user object stores these under `attributes.bucket-permissions`, e.g.
  # (see modos-groups-users-blueprint.yaml):
  #   attributes:
  #     bucket-permissions:
  #       - bucket-a/a/b/@read
  #       - bucket-b/b/@write
  - model: authentik_providers_oauth2.scopemapping
    id: modos-scopemapping-bp-user
    identifiers:
      name: "Modos Bucket-Permissions (bp-user)"
    attrs:
      slug: modos-scopemapping-bp-user
      scope_name: permissions
      description: "Modos bucket permissions from the user's attributes."
      expression: |
        return {
            "bp-user": request.user.attributes.get("bucket-permissions", [])
        }

  # Property Mapping
  # ==============================================
  # Assemble the user's bucket permissions from the groups they belong to, as a
  # `bp-groups` claim: a list of {p: <bucket-path>, bp: read|write}, one entry
  # per group that carries both `bucket-path` and `bucket-permission`
  # attributes. Groups without those attributes (e.g. structural parents) are
  # skipped.
  - model: authentik_providers_oauth2.scopemapping
    id: modos-scopemapping-bp-mapper
    identifiers:
      name: "Modos Bucket Permissions (bp-mapper)"
    attrs:
      slug: modos-scopemapping-bp-mapper
      scope_name: permissions
      description: "Bucket permissions from the user's groups and their parents."
      expression: |
        perms = []
        seen_paths = set()   # child-wins: first time we see a path, keep it
        visited = set()      # avoid re-processing / cycles in the parent graph (its possible wtf...)

        # BFS upward through the group graph (a group can have multiple parents).
        queue = list(request.user.ak_groups.all())
        while queue:
            g = queue.pop(0)
            if g.pk in visited:
                continue
            visited.add(g.pk)

            attrs = g.attributes or {}
            for perm in attrs.get("bucket-permissions", []):
                p = perm.get("path")
                bp = perm.get("permission")

                if p and bp and p not in seen_paths:
                    seen_paths.add(p)
                    perms.append({"p": p, "bp": bp})

            queue.extend(g.parents.all())

        return {"bp-mapper": perms}

  # Property Mapping
  # ==============================================
  # All groups the user is a member of, as a `groups` claim.
  - model: authentik_providers_oauth2.scopemapping
    id: modos-scopemapping-bp-groups
    identifiers:
      name: "Modos Bucket Permissions (bp-groups)"
    attrs:
      slug: modos-scopemapping-bp-groups
      scope_name: permissions
      description: "Bucket permissions driven by group names only."
      expression: |
        return {
            "bp-groups": [group.name for group in request.user.ak_groups.all()],
        }

  # OIDC Application + Provider
  # ==============================================
  # Public client `modos-cli`, equivalent to the Keycloak client. The device
  # grant is enabled via the brand binding above. `authorization_flow` is
  # required by the provider model; implicit consent mirrors Keycloak's
  # `consentRequired: false`. No redirect URIs are needed for a device-only CLI.
  - model: authentik_providers_oauth2.oauth2provider
    id: modos-oauth-provider
    identifiers:
      name: Modos CLI
    attrs:
      name: Modos CLI

      client_type: public
      client_id: modos-cli
      sub_mode: user_username

      # Somehow needs to be provided...?
      redirect_uris: []

      grant_types:
        - urn:ietf:params:oauth:grant-type:device_code
        - refresh_token

      # Sign tokens with the ES256 (P-256) keypair defined above.
      # The provider only supports RS256 and ES256/384/512.
      # EdDSA with ed25119 is not supported.
      signing_key: !KeyOf cert-modos-es256

      authorization_flow:
        !Find [
          authentik_flows.flow,
          [slug, default-provider-authorization-implicit-consent],
        ]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      property_mappings:
        - !Find [
            authentik_providers_oauth2.scopemapping,
            [managed, goauthentik.io/providers/oauth2/scope-openid],
          ]
        - !Find [
            authentik_providers_oauth2.scopemapping,
            [managed, goauthentik.io/providers/oauth2/scope-profile],
          ]
        - !Find [
            authentik_providers_oauth2.scopemapping,
            [managed, goauthentik.io/providers/oauth2/scope-email],
          ]
        # Custom Mappers
        - !KeyOf modos-scopemapping-bp-groups
        - !KeyOf modos-scopemapping-bp-user
        - !KeyOf modos-scopemapping-bp-mapper

  # The modos application.
  - model: authentik_core.application
    id: modos-cli-app
    identifiers:
      slug: modos-cli-app
    attrs:
      name: Modos CLI
      provider: !KeyOf modos-oauth-provider
