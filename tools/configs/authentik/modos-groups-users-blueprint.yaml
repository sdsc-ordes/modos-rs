# yaml-language-server: $schema=https://version-2026-5.goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: Modos Groups and Users

entries:
  # Groups
  # ==============================================
  - model: authentik_core.group
    id: group-bucket-d
    identifiers:
      name: group-bucket-d
    attrs:
      attributes:
        bucket-permissions:
          - path: bucket-d/d
            permission: read

  - model: authentik_core.group
    id: group-bucket-d-partial
    identifiers:
      name: group-bucket-d-partial
    attrs:
      parents:
        - !KeyOf group-bucket-d
      attributes:
        bucket-permissions:
          - path: bucket-d/d/subpath
            permission: write
          # Test if that overwrites.
          - path: bucket-d/d
            permission: write

  - model: authentik_core.group
    id: group-bucket-e
    identifiers:
      name: group-bucket-e
    attrs:
      attributes:
        bucket-permissions:
          - path: bucket-e/e/subpath
            permission: read

  - model: authentik_core.group
    id: bucket-c-subpath
    identifiers:
      name: bucket-c-subpath

  - model: authentik_core.group
    id: bucket-c-subpath-read
    identifiers:
      name: "bucket-c/subpath/@read"
    attrs:
      parents:
        - !KeyOf bucket-c-subpath

  - model: authentik_core.group
    id: bucket-c-subpath-write
    identifiers:
      name: "bucket-c/subpath/@write"
    attrs:
      parents:
        - !KeyOf bucket-c-subpath
  # ==============================================

  # User
  # ==============================================
  - model: authentik_core.user
    id: user-test
    identifiers:
      username: test@example.com
    attrs:
      username: test@example.com
      email: test@example.com
      name: test
      is_active: true
      password: test
      attributes:
        bucket-permissions:
          - bucket-a/a/b/@read
          - bucket-b/b/@write
      groups:
        - !KeyOf group-bucket-d
        - !KeyOf group-bucket-d-partial
        - !KeyOf group-bucket-e
        - !KeyOf bucket-c-subpath-read
        - !KeyOf bucket-c-subpath-write
  # ==============================================
