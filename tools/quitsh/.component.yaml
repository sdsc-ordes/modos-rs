name: quitsh
version: 1.0.0
language: go

targets:
  test:
    inputs: ["self"]
    steps:
      - runner: go
      - runner: go-bin
        config:
          # Build everything instrumented.
          # Execute the binaries via a `go test` provided in the following
          # pkg and with tags.
          testPkg: test
          buildTags: ["integration"]
          testTags: ["integration"]
      - runner: coverage-upload

  build:
    inputs: ["self"]
    steps:
      - runner: go
  lint:
    steps:
      - runner: go
